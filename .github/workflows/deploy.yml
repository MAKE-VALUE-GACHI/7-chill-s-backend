name: Build and Deploy via SSH Password

on:
  push:
    branches: [ develop ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v3

      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'

      #      - name: Build Spring Boot JAR
      #        run: ./gradlew build -x test

      - name: Build Docker image
        run: docker build -t chills:latest .

      - name: Set versioned filename
        id: version
        run: |
          VERSION_TAG=$(date +'%Y%m%d%H%M')_$(git rev-parse --short HEAD)
          echo "tag=$VERSION_TAG" >> $GITHUB_OUTPUT

      - name: Save Docker image to TAR
        run: docker save -o chills_${{ steps.version.outputs.tag }}.tar chills:latest

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Copy TAR to remote server
        run: |
          sshpass -p "${{ secrets.SSH_PASSWORD }}" scp -P 107 -o StrictHostKeyChecking=no \
            chills_${{ steps.version.outputs.tag }}.tar ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/home/gachi/images

      - name: SSH into server and deploy Docker container
        run: |
          sshpass -p "${{ secrets.SSH_PASSWORD }}" ssh -p 107 -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
              echo "🛠 Loading Docker image..."
              docker load -i /home/gachi/images/chills_${{ steps.version.outputs.tag }}.tar

              echo "🧼 Stopping and removing old container..."
              docker stop chills || true
              docker rm chills || true

              echo "🚀 Running new container..."
              docker run -d \
                --name chills \
                -e PORT=${{ secrets.PORT }} \
                -e DB_URL=${{ secrets.DB_URL }} \
                -e DB_USER=${{ secrets.DB_USER }} \
                -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
                -e JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }} \
                -e JWT_ACCESS_TOKEN_VALIDITY=${{ secrets.JWT_ACCESS_TOKEN_VALIDITY }} \
                -e JWT_REFRESH_TOKEN_VALIDITY=${{ secrets.JWT_REFRESH_TOKEN_VALIDITY }} \
                -p 10701:8080 \
                chills:latest

              echo "✅ Deployment complete!"
          EOF
