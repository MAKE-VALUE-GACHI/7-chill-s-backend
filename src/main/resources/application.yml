server:
  shutdown: graceful
  error:
    whitelabel:
      enabled: false

spring:
  application:
    name: chills
  web:
    resources:
      add-mappings: false
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/chills}
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:chills}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_batch_fetch_size: 100
  flyway:
    enabled: true
    encoding: UTF-8
    baseline-on-migrate: true
    baseline-version: 1
    locations: classpath:db/migration

jwt:
  secret-key: ${JWT_SECRET_KEY:a949ce37d80bfe7a1b1b0c28ef2a4911d3eb7675149b8902925ba8e754499336}
  access-token-validity: ${JWT_ACCESS_TOKEN_VALIDITY:43200} # seconds (12 hours)
  refresh-token-validity: ${JWT_REFRESH_TOKEN_VALIDITY:604800} # seconds (1 week)
